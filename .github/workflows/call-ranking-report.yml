# Bao cao Telegram 2 lan/ngay: top can duoc goi nhieu nhat trong 24h qua.
# Lay du lieu qua API backend Render (da duoc phep truy cap SQL) roi gui Telegram,
# nen chay dung gio ke ca khi tat laptop.
#
# Gio Viet Nam (UTC+7):
#   08:00 sang = 01:00 UTC
#   20:00 toi  = 13:00 UTC
# Cron GitHub co the tre 5-30 phut luc cao diem; noi dung van dung vi luon nhin
# lai dung 24h tinh tu thoi diem chay.
name: call-ranking-report

on:
  schedule:
    - cron: "0 1 * * *"    # 08:00 VN
    - cron: "0 13 * * *"   # 20:00 VN
  workflow_dispatch:
    inputs:
      top:
        description: "So can hien trong bang xep hang"
        default: "15"
        type: string

concurrency:
  group: call-ranking-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Gui bao cao Telegram
        env:
          API_BASE_URL: ${{ secrets.REPORT_API_BASE_URL }}
          REPORT_LOGIN_USER: ${{ secrets.REPORT_LOGIN_USER }}
          REPORT_LOGIN_PASSWORD: ${{ secrets.REPORT_LOGIN_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python backend/scripts/telegram_call_ranking_report.py --top "${{ inputs.top || '15' }}"
