services:
  - type: web
    name: landsoft-mobile-api
    runtime: docker
    rootDir: backend
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: USE_STUB_GATEWAY
        value: "false"
      - key: SQL_DRIVER
        value: ODBC Driver 18 for SQL Server
      - key: SQL_SERVER
        sync: false
      - key: SQL_PORT
        value: "1433"
      - key: SQL_DATABASE
        sync: false
      - key: SQL_USERNAME
        sync: false
      - key: SQL_PASSWORD
        sync: false
      # Ma hoa duong truyen SQL (TLS); van tin cert self-signed cua SQL Server noi bo.
      - key: SQL_ENCRYPT
        value: "yes"
      - key: SQL_TRUST_SERVER_CERT
        value: "yes"
