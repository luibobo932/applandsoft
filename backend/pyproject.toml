# Cau hinh cong cu cho backend (ruff lint + pytest).
# Khong dung de dong goi/build; dependency van khai bao trong requirements*.txt.

[tool.ruff]
line-length = 120
target-version = "py311"
extend-exclude = ["data", "config"]

[tool.ruff.lint]
# E/F: bo rule mac dinh cua ruff (pyflakes + mot phan pycodestyle) — bat loi that
# (import thua, ten chua dinh nghia, cu phap) ma khong ep dinh dang lai toan bo import.
select = ["E4", "E7", "E9", "F"]

[tool.ruff.lint.per-file-ignores]
# Test phai set bien moi truong (USE_STUB_GATEWAY) truoc khi import app -> chap nhan import khong o dau file.
"tests/*" = ["E402"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
